<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">

  <g transform="translate(300, 165)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Gold quarter arc top-right -->
    <path d="M 0,-100 A 100,100 0 0,1 100,0" fill="none" stroke="#DAA960" stroke-width="2"/>
    <!-- Gap cover dots -->
    <circle cx="0" cy="-100" r="8" fill="#141518"/>
    <circle cx="100" cy="0" r="8" fill="#141518"/>
    <circle cx="0" cy="-100" r="5" fill="#DAA960"/>
    <circle cx="100" cy="0" r="5" fill="#DAA960"/>

    <!-- Middle ring -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <!-- Gold quarter arc bottom-right -->
    <path d="M 65,0 A 65,65 0 0,1 0,65" fill="none" stroke="#DAA960" stroke-width="1.5"/>
    <circle cx="65" cy="0" r="6" fill="#141518"/>
    <circle cx="0" cy="65" r="6" fill="#141518"/>
    <circle cx="65" cy="0" r="3.5" fill="#DAA960"/>
    <circle cx="0" cy="65" r="3.5" fill="#ffffff" opacity="0.4"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
    <path d="M -30,0 A 30,30 0 0,0 0,-30" fill="none" stroke="#DAA960" stroke-width="1"/>
    <circle cx="-30" cy="0" r="2.5" fill="#DAA960" opacity="0.6"/>

    <!-- Arrows -->
    <polygon points="0,-105 -4.5,-95 4.5,-95" fill="#DAA960"/>
    <polygon points="105,0 95,-4.5 95,4.5" fill="#DAA960"/>

    <!-- Cross guides -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
  </g>

  <!-- Wordmark -->
  <text y="318" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="500" letter-spacing="2">
    <tspan x="300" fill="#ffffff">SYSTEM</tspan><tspan fill="#DAA960">PA</tspan><tspan fill="#ffffff">RADOKSET</tspan>
  </text>

  <!-- Sub label -->
  <text x="300" y="344" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="10"
    font-weight="400"
    letter-spacing="5"
    fill="#DAA960">PODCAST</text>

</svg>
