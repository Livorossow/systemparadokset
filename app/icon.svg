<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="18" fill="#141518"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
  <!-- Gold arc top-right -->
  <path d="M 50,7 A 43,43 0 0,1 93,50" fill="none" stroke="#DAA960" stroke-width="2.5"/>
  <!-- Gold dots at arc endpoints -->
  <circle cx="50" cy="7" r="3.5" fill="#DAA960"/>
  <circle cx="93" cy="50" r="3.5" fill="#DAA960"/>
  <!-- P in the center -->
  <text x="50" y="61" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#DAA960">P</text>
</svg>
